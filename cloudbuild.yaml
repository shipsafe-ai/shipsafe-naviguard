steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - auth
      - configure-docker
      - us-central1-docker.pkg.dev

  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/naviguard/naviguard:$COMMIT_SHA"
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "us-central1-docker.pkg.dev/$PROJECT_ID/naviguard/naviguard:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - naviguard
      - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/naviguard/naviguard:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-secrets=PHOENIX_API_KEY=PHOENIX_API_KEY:latest,PHOENIX_COLLECTOR_ENDPOINT=PHOENIX_COLLECTOR_ENDPOINT:latest"
      - "--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1,PHOENIX_PROJECT_NAME=naviguard,PHOENIX_BASE_URL=https://app.phoenix.arize.com/s/prateek-srivastava23,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/naviguard/naviguard:$COMMIT_SHA"
